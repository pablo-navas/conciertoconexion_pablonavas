<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reserva tu lugar | Evento</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/eventualmente.css">
</head>
<body class="fondo-negro">

    <header class="header-editor">
        <div class="header-top">
            <a href="../index.html" class="btn-regresar">Volver</a>
            <div class="accion-guardar">
                <span id="texto-accion">Comprar boletos</span>
                <button id="btn-comprar-final" class="btn-plus">aqui</button>
            </div>
        </div>
        <div class="contenedor-titulo">
            <h1 id="pub-nombre-concierto" class="titulo-naranja" style="font-size: 2.5rem;"></h1>
        </div>
    </header>

    <main class="cuerpo-editor">
        <section class="fila-superior">
            <div class="caja-foto">
                <div class="placeholder-img" id="pub-preview-img">
                    <img id="img-destino" src="" style="width:100%; height:100%; object-fit:cover; display:none;">
                </div>
            </div>

            <div class="caja-descripcion">
                <p id="pub-descripcion-evento" style="color: white; padding: 10px; font-size: 1.1rem;"></p>
            </div>
        </section>

        <section class="seccion-horarios">
            <h3 class="titulo-naranja-centrado">Fechas y Ubicaciones</h3>
            <div class="contenedor-horarios-grid">
                <div class="grid-fechas" id="pub-lista-horarios"></div>
            </div>
        </section>
    </main>

    <script src="../js/evento-pub.js"></script>
</body>
</html>
