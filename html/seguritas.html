<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Seguridad</title>
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body class="fondo-negro-login">

    <div class="contenedor-login">
        <h1 class="titulo-naranja">Acceso de Administrador</h1>
        
        <form id="form-login" class="tarjeta-login">
            <div class="campo">
                <label>Nombre</label>
                <input type="text" id="nombre-admin" placeholder="Escribe tu nombre" required>
            </div>
            
            <div class="campo">
                <label>Correo Electrónico</label>
                <input type="email" id="email-admin" placeholder="admin@mail.com" required>
            </div>
            
            <div class="campo">
                <label>Contraseña</label>
                <input type="password" id="pass-admin" placeholder="******" required>
            </div>

            <div class="botones-login">
                <button type="submit" class="btn-guardar">Ingresar</button>
                <a href="../index.html" class="btn-cancelar">Pa` atras</a>
            </div>
        </form>
    </div>

    <script src="../js/seguritas.js"></script>
</body>
</html>
