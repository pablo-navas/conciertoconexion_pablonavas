<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin | Inventario de Eventos</title>
    <link rel="stylesheet" href="/css/admin.css">
    <style>
        
        .tabla-gestion { width: 90%; margin: 20px auto; border-collapse: collapse; color: white; }
        .tabla-gestion th, .tabla-gestion td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        .tabla-gestion th { color: #ffb700; text-transform: uppercase; font-size: 0.8rem; }
        .img-mini { width: 50px; height: 50px; object-fit: cover; border-radius: 5px; }
        .btn-borrar { background: #ff4444; color: white; border: none; padding: 5px 10px; cursor: pointer; border-radius: 3px; }
        .btn-borrar:hover { background: #cc0000; }
    </style>
</head>
<body class="fondo-negro">

    <header class="header-editor">
        <div class="header-top">
            <a href="/index.html" class="btn-regresar">Ir al Inicio</a>
            <div class="accion-guardar">
                <span>Nuevo Evento</span>
                <a href="/html/eventos.html" class="btn-plus" style="text-decoration: none; display: inline-flex; align-items: center; justify-content: center;">+</a>
            </div>
        </div>
        <div class="contenedor-titulo">
            <h1 class="titulo-naranja">Panel de Control: Inventario</h1>
        </div>
    </header>

    <main>
        <table class="tabla-gestion">
            <thead>
                <tr>
                    <th>Imagen</th>
                    <th>Nombre del Concierto</th>
                    <th>ID</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="lista-inventario-body">
                </tbody>
        </table>
    </main>

    <script src="/js/listevento.js"></script>
</body>
</html>
