<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Detalle del Concierto</title>
    <link rel="stylesheet" href="../css/admin.css">
    <link rel="stylesheet" href="../css/eventualmente.css">
</head>
<body class="fondo-negro" style="color: white; font-family: sans-serif;">

    <main style="max-width: 800px; margin: 40px auto; padding: 20px; border: 1px solid #ff8c00; border-radius: 10px;">
        <div style="display: flex; gap: 30px; flex-wrap: wrap;">
            <img id="det-imagen" src="" style="width: 300px; border: 3px solid #ff8c00; border-radius: 8px;">
            
            <div style="flex: 1;">
                <h1 id="det-nombre" style="color: #ff8c00; margin-top: 0;">Cargando...</h1>
                <p id="det-descripcion" style="line-height: 1.6; color: #ccc;"></p>
            </div>
        </div>

        <section style="margin-top: 40px;">
            <h3 style="border-bottom: 2px solid #ff8c00; padding-bottom: 10px;">Fechas y Lugares</h3>
            <div id="det-horarios" style="display: grid; gap: 10px; margin-top: 20px;">
                </div>
        </section>
    </main>

    <script src="../js/detalle.js"></script>
</body>
</html>
