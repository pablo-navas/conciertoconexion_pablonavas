<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin </title>
    <link rel="stylesheet" href="/css/inexplus.css">
</head>
<body class="fondo-negro">

    <header class="header-admin">
        <h1 class="titulo-naranja">Panel de Administración</h1>
        <button id="btn-cerrar-sesion" class="btn-cancelar"> <a href="/index.html">Cerrar sesion</a></button>
    </header>

    <main class="contenedor-modulos">
        <div class="tarjeta-modulo" onclick="window.location.href='categorias.html'">
            
            <h2>Categorías</h2>
            <p>Gestiona los géneros de los eventos (Rock, Pop, etc.)</p>
        </div>

        <div class="tarjeta-modulo" onclick="window.location.href='eventos.html'">
           
            <h2>Eventos</h2>
            <p>Crea, edita y elimina los conciertos de la plataforma</p>
        </div>

        <div class="tarjeta-modulo" onclick="window.location.href='ventas.html'">
        
            <h2>Ventas</h2>
            <p>Revisa quién ha comprado boletos y el total recaudado</p>
        </div>
    </main>

    <script>
        document.getElementById('btn-cerrar-sesion').onclick = () => {
            window.location.href = 'login.html';
        };
    </script>
</body>
</html>
